<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Olympic Teams - Paris 2024</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <style>
        #map {
            height: 600px;
            width: 100%;
        }

        .country-info {
            margin-top: 20px;
        }

            .country-info h4 {
                margin: 0;
            }
    </style>
</head>
<body>
    <h1>Olympic Teams - Paris 2024</h1>
    <div id="map"></div>

    <div class="country-info" id="country-info">
        <h4>Select a country on the map to see its name.</h4>
    </div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-choropleth/dist/leaflet-choropleth.js"></script>

    <script>
        // Create the map
        var map = L.map('map').setView([20, 0], 2);  // Centralize the map at the equator

        // Set the tile layer (OpenStreetMap tiles)
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
        }).addTo(map);

        // URL for the GeoJSON data (World countries)
        var geojsonUrl = 'https://raw.githubusercontent.com/codeforamerica/click_that_hood/master/public/data/world-countries.geojson';

        // Function to highlight country and show name when clicked
        function onEachFeature(feature, layer) {
            layer.on({
                click: function (e) {
                    var countryName = feature.properties.name;

                    var infoDiv = document.getElementById('country-info');
                    infoDiv.innerHTML = '<h4>' + countryName + '</h4>';
                }
            });
        }

        // Style for countries (removing blue boxes and adjusting fill and stroke color)
        function style() {
            return {
                fillColor: '#ffffff',  // White fill color
                weight: 1,  // Thin border
                opacity: 0.6,  // Border opacity
                color: '#000000',  // Black border color
                dashArray: '3',  // Dashed lines if desired
                fillOpacity: 0.3  // Slight opacity to show the countries
            };
        }

        // Load the GeoJSON data and add to map
        fetch(geojsonUrl)
            .then(response => response.json())
            .then(data => {
                // Add GeoJSON layer to the map
                L.geoJSON(data, {
                    onEachFeature: onEachFeature,
                    style: style  // Apply custom style
                }).addTo(map);
            })
            .catch(error => {
                console.error("Error loading GeoJSON data:", error);
            });
    </script>
</body>
</html>
