<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark/Light Mode Toggle</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
    <style>
        body.dark-mode {
            background-color: #121212;
            color: #ffffff;
        }

        .navbar-dark-mode {
            background-color: #343a40 !important;
        }

        .navbar-light-mode {
            background-color: #f8f9fa !important;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light-mode fixed-top">
        <div class="container">
            <a class="navbar-brand" href="index.html" tabindex="Olympics">
                <img src="images/Paris2024.png" height="60" />
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link " aria-current="page" href="athletes.html"><i class="fa fa-user-o text-warning"></i> Athletes</a></li>
                    <li class="nav-item"><a class="nav-link" aria-current="page" href="competitions.html"><i class="fa fa-trophy"></i> Competitions</a></li>
                    <li class="nav-item"><a class="nav-link" aria-current="page" href="coaches.html"><i class=" fa fa-flag-o text-danger"></i> Coaches</a></li>
                    <li class="nav-item"><a class="nav-link" aria-current="page" href="games.html"><i class="fa fa-map-marker text-success"></i> Games</a></li>
                    <li class="nav-item"><a class="nav-link " aria-current="page" href="modalities.html"><i class="fa fa-soccer-ball-o text-primary"></i> Modalities</a></li>
                    <li class="nav-item"><a class="nav-link " aria-current="page" href="contagem.html"><i class="fa fa-hourglass-half" aria-hidden="true"></i> LA2028</a></li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                            <i class="fa fa-folder-o" aria-hidden="true"></i> More
                        </a>
                        <ul class="dropdown-menu dropdown-menu-dark">
                            <a class="dropdown-item" href="news.html"> Olympic Games News </a>
                            <a class="dropdown-item" href="loja.html"> Loja </a>
                            <a class="dropdown-item" href="countdown.html">Paris 2024</a>
                        </ul>
                    </li>
                </ul>
                <ul class="navbar-nav mb-2 mb-lg-0 right-side">
                    <li class="nav-item">
                        <button id="themeToggle" class="btn btn-outline-secondary">
                            <i class="fa fa-moon"></i>
                        </button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <script>
        const themeToggle = document.getElementById('themeToggle');
        const body = document.body;
        const navbar = document.querySelector('.navbar');

        themeToggle.addEventListener('click', () => {
            body.classList.toggle('dark-mode');
            if (body.classList.contains('dark-mode')) {
                navbar.classList.remove('navbar-light-mode');
                navbar.classList.add('navbar-dark-mode');
                themeToggle.innerHTML = '<i class="fa fa-sun"></i>';
            } else {
                navbar.classList.remove('navbar-dark-mode');
                navbar.classList.add('navbar-light-mode');
                themeToggle.innerHTML = '<i class="fa fa-moon"></i>';
            }
        });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
