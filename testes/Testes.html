<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Olympics 2024 Venues</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.3/leaflet.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.3/leaflet.css" />
    <style>
        #map {
            height: 100vh;
            width: 100%;
        }
    </style>
</head>
<body>
    <h1>Olympics 2024 Venues</h1>
    <div id="map"></div>
    <script>
        // Initialize the map
        var map = L.map('map').setView([48.8566, 2.3522], 12); // Centered on Paris

        // Add OpenStreetMap tiles
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // Venue data: latitude, longitude, name, sport, and capacity
        var venues = [
            { lat: 48.9708, lon: 2.3167, name: "Yves du Manoir Stadium", sport: "Field hockey", capacity: "14,000" },
            { lat: 48.9245, lon: 2.3602, name: "Stade de France", sport: "Rugby sevens, Athletics", capacity: "80,698" },
            { lat: 48.8948, lon: 2.2399, name: "Paris La Défense Arena", sport: "Swimming, Water polo finals", capacity: "40,000" },
            { lat: 48.9003, lon: 2.3706, name: "Porte de La Chapelle Arena", sport: "Badminton, Rhythmic gymnastics", capacity: "8,000" },
            { lat: 48.8306, lon: 2.3727, name: "Paris Aquatic Centre", sport: "Water polo preliminaries, Diving, Artistic swimming", capacity: "15,000" },
            { lat: 48.9463, lon: 2.4183, name: "Le Bourget Climbing Venue", sport: "Sport climbing", capacity: "8,000" },
            { lat: 48.9315, lon: 2.3623, name: "Arena Paris Nord", sport: "Boxing, Modern pentathlon", capacity: "10,000" },
            { lat: 48.8422, lon: 2.2527, name: "Parc des Princes", sport: "Football", capacity: "47,929" },
            { lat: 48.8471, lon: 2.2493, name: "Stade Roland Garros", sport: "Tennis, Boxing", capacity: "15,000" },
            { lat: 48.8354, lon: 2.2882, name: "Paris Expo Porte de Versailles", sport: "Volleyball, Table Tennis, Handball, Weightlifting", capacity: "20,000" },
            { lat: 48.8373, lon: 2.3786, name: "Bercy Arena", sport: "Gymnastics, Basketball", capacity: "20,300" },
            { lat: 48.8662, lon: 2.3117, name: "Grand Palais", sport: "Fencing, Taekwondo", capacity: "8,500" },
            { lat: 48.8656, lon: 2.3210, name: "Place de la Concorde", sport: "Basketball 3x3, Breaking, Cycling BMX freestyle, Skateboarding", capacity: "30,000" },
            { lat: 48.8576, lon: 2.3510, name: "Hôtel de Ville", sport: "Marathon Start", capacity: "N/A" },
            { lat: 48.8652, lon: 2.3134, name: "Pont Alexandre III", sport: "Marathon swimming, Triathlon, Cycling", capacity: "N/A" },
            { lat: 48.8626, lon: 2.2876, name: "Trocadéro", sport: "Race Walk, Cycling road race", capacity: "N/A" },
            { lat: 48.8544, lon: 2.2989, name: "Eiffel Tower Stadium", sport: "Beach volleyball", capacity: "12,000" },
            { lat: 48.8550, lon: 2.3015, name: "Grand Palais Éphémère", sport: "Judo, Wrestling", capacity: "8,000" },
            { lat: 48.8566, lon: 2.3123, name: "Les Invalides", sport: "Archery, Marathon finish", capacity: "N/A" },
            { lat: 48.8049, lon: 2.1287, name: "Gardens of the Palace of Versailles", sport: "Equestrian, Modern pentathlon", capacity: "20,000" },
            { lat: 48.7505, lon: 2.0735, name: "Le Golf National", sport: "Golf", capacity: "80,000" },
            { lat: 48.7720, lon: 2.0338, name: "Élancourt Hill", sport: "Cycling mountain biking", capacity: "N/A" },
            { lat: 48.7983, lon: 2.0388, name: "Vélodrome de Saint-Quentin-en-Yvelines", sport: "Cycling track, BMX racing", capacity: "5,000" },

            { lat: 43.2699, lon: 5.3957, name: "Stade Vélodrome", sport: "Football", capacity: "67,394" },
            { lat: 45.7650, lon: 4.9822, name: "Parc Olympique Lyonnais", sport: "Football", capacity: "59,186" },
            { lat: 44.8979, lon: -0.5634, name: "Stade Matmut Atlantique", sport: "Football", capacity: "42,115" },
            { lat: 45.4609, lon: 4.3946, name: "Stade Geoffroy-Guichard", sport: "Football", capacity: "41,965" },
            { lat: 43.7052, lon: 7.2651, name: "Allianz Riviera", sport: "Football", capacity: "36,178" },
            { lat: 47.2565, lon: -1.5250, name: "Stade de la Beaujoire", sport: "Football", capacity: "35,322" },
            { lat: 43.2812, lon: 5.3651, name: "Roucas Blanc Olympic Marina", sport: "Sailing", capacity: "N/A" },
            { lat: -17.8481, lon: -149.2180, name: "Teahupo'o", sport: "Surfing", capacity: "600" },
            { lat: 46.8100, lon: 1.7038, name: "National Shooting Centre", sport: "Shooting", capacity: "N/A" }
        ];

        // Add markers to the map
        venues.forEach(function (venue) {
            L.marker([venue.lat, venue.lon]).addTo(map)
                .bindPopup(
                    `<b>${venue.name}</b><br>` +
                    `<i>Sport(s):</i> ${venue.sport}<br>` +
                    `<i>Capacity:</i> ${venue.capacity}`
                );
        });
    </script>
</body>
</html>
