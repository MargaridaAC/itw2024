<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paris 2024</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="../../lib/font-awesome/dist/css/font-awesome.min.css" rel="stylesheet" />
    <style>
        .navbar-custom {
            background-color: white;
            border-bottom: 1px solid #ddd;
        }

        .navbar-nav .nav-link {
            font-size: 14px;
            text-transform: uppercase;
            margin-right: 15px;
            color: black;
        }

            .navbar-nav .nav-link:hover {
                color: red;
            }

        .dropdown-menu {
            width: 100%;
            min-width: 800px;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            background-color: white;
            border: 1px solid #ddd;
        }

        .dropdown-item {
            font-size: 14px;
            color: black;
        }

            .dropdown-item:hover {
                color: red;
            }

        .trending-products {
            width: 200px;
            border-left: 1px solid #ddd;
            padding-left: 20px;
        }

            .trending-products img {
                width: 100%;
                height: auto;
                margin-bottom: 10px;
            }

        @media (max-width: 768px) {
            .dropdown-menu {
                width: auto;
                min-width: 100%;
                padding: 10px;
            }

            .dropdown-column {
                width: 100%;
                margin-bottom: 10px;
            }
        }

        /* Style for sports cards */
        .container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: space-between;
            margin-top: 20px;
        }

        .sport-card {
            position: relative;
            width: calc(25% - 20px);
            height: 150px;
            overflow: hidden;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease;
        }

            .sport-card:hover {
                transform: scale(1.05);
            }

            .sport-card img {
                width: 100%;
                height: 100%;
                object-fit: cover;
                filter: brightness(50%);
            }

            .sport-card .sport-name {
                position: absolute;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                color: white;
                font-size: 20px;
                font-weight: bold;
                text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.8);
            }

            .sport-card:active .sport-name {
                color: yellow;
            }

        h1 {
            text-align: center;
            margin-bottom: 20px;
        }

        /* For small screens, adjust the layout to show 2 per row */
        @media (max-width: 768px) {
            .sport-card {
                width: calc(50% - 10px);
            }
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-light navbar-custom">
        <div class="container">

            <a class="navbar-brand" href="#">
                <img src="images/Paris2024.png" alt="Franklin Logo" width="150">
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavDropdown" aria-controls="navbarNavDropdown" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNavDropdown">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item dropdown">
                        <a class="nav-link" id="sports-link" href="#">Sports</a>
                        <div class="dropdown-menu" id="sports-dropdown">
                            <div class="dropdown-column">
                                <h6>Baseball</h6>
                                <a class="dropdown-item" href="#">MLB® Batting Gloves</a>
                                <a class="dropdown-item" href="#">Fielding Gloves</a>
                                <a class="dropdown-item" href="#">Training</a>
                            </div>
                            <div class="dropdown-column">
                                <h6>Soccer</h6>
                                <a class="dropdown-item" href="#">Balls</a>
                                <a class="dropdown-item" href="#">Goals/Rebounders</a>
                                <a class="dropdown-item" href="#">Training</a>
                            </div>
                            <div class="dropdown-column">
                                <h6>Football</h6>
                                <a class="dropdown-item" href="#">Balls</a>
                                <a class="dropdown-item" href="#">Gloves</a>
                                <a class="dropdown-item" href="#">Flag Football</a>
                            </div>
                        </div>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Family Games</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Fan Shop</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Sale</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Gift Cards</a>
                    </li>
                </ul>
                <form class="d-flex">
                    <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search">
                    <button class="btn btn-outline-dark" type="submit">Search</button>
                </form>
            </div>
            <ul class="navbar-nav justify-content-end" id="bd-theme">
                <li class="nav-item"><div class="nav-link" type="button" data-bs-theme-value="light" aria-pressed="false"><i class="theme-icon fa fa-sun-o" title="Modo claro"></i></div></li>
                <li class="navbar-text hstack"><div class="vr"></div></li>
                <li class="nav-item"><div class="nav-link" type="button" data-bs-theme-value="dark" aria-pressed="false"><i class="theme-icon fa fa-moon-o" title="Modo escuro"></i></div></li>
            </ul>
        </div>
    </nav>

    <h1>Olympic Sports</h1>

    <div class="container" id="sports-container">
        <!-- Sports cards will be injected here -->
    </div>

    <script>
        const sports = [
            "Archery", "Artistic Gymnastics", "Fencing", "Football", "Golf", "Handball", "Hockey",
            "Judo", "Marathon Swimming", "Modern Pentathlon", "Rhythmic Gymnastics", "Rowing", "Rugby Sevens",
            "Sailing", "Shooting", "Skateboarding", "Sport Climbing", "Surfing", "Swimming", "Table Tennis",
            "Taekwondo", "Tennis", "Trampoline", "Triathlon", "Volleyball", "Water Polo", "Weightlifting",
            "Wrestling", "Artistic Swimming", "Athletics", "Badminton", "Basketball", "Basketball 3x3",
            "Beach Volleyball", "Boxing", "Breaking", "Canoe Slalom", "Canoe Sprint", "Cycling BMX Freestyle",
            "Cycling BMX Racing", "Cycling Mountain Bike", "Cycling Road", "Cycling Track", "Diving", "Equestrian"
        ];

        const container = document.getElementById("sports-container");

        // Function to create sport cards dynamically
        sports.forEach(sport => {
            const sportCard = document.createElement("div");
            sportCard.classList.add("sport-card");
            sportCard.onclick = () => showSport(sport);

            // Creating the sport card image (Placeholder image for now)
            const img = document.createElement("img");
            img.src = `https://via.placeholder.com/250x150?text=${sport.replace(/\s+/g, '+')}`;
            img.alt = sport;

            // Creating the name overlay
            const sportName = document.createElement("div");
            sportName.classList.add("sport-name");
            sportName.textContent = sport;

            sportCard.appendChild(img);
            sportCard.appendChild(sportName);

            container.appendChild(sportCard);
        });

        // Function to show a message when a sport card is clicked
        function showSport(sportName) {
            alert(`You selected: ${sportName}`);
        }
    </script>

</body>
</html>
