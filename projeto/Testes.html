<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paris 2024</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="../../lib/font-awesome/dist/css/font-awesome.min.css" rel="stylesheet" />
    <style>
        body {
            transition: background-color 0.3s, color 0.3s;
        }

        .navbar-custom {
            background-color: white;
            border-bottom: 1px solid #ddd;
        }

        .navbar-nav .nav-link {
            font-size: 14px;
            text-transform: uppercase;
            margin-right: 15px;
            color: black;
        }

            .navbar-nav .nav-link:hover {
                color: red;
            }

        .dropdown-menu {
            width: 100%;
            min-width: 800px;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            background-color: white;
            border: 1px solid #ddd;
        }

        .dropdown-item {
            font-size: 14px;
            color: black;
        }

            .dropdown-item:hover {
                color: red;
            }

        .trending-products {
            width: 200px;
            border-left: 1px solid #ddd;
            padding-left: 20px;
        }

            .trending-products img {
                width: 100%;
                height: auto;
                margin-bottom: 10px;
            }

        /* Light Theme Styles */
        body.light-theme {
            background-color: white;
            color: black;
        }

        .navbar-custom.light-theme {
            background-color: white;
            border-bottom: 1px solid #ddd;
        }

        /* Dark Theme Styles */
        body.dark-theme {
            background-color: #121212;
            color: white;
        }

        .navbar-custom.dark-theme {
            background-color: #333;
            border-bottom: 1px solid #444;
        }

        .navbar-nav .nav-link.dark-theme {
            color: white;
        }

            .navbar-nav .nav-link.dark-theme:hover {
                color: #ff5733; /* Hover effect in dark mode */
            }
    </style>
</head>
<body class="light-theme">
    <!-- Default light theme -->
    <nav class="navbar navbar-expand-lg navbar-light navbar-custom">
        <div class="container">

            <a class="navbar-brand" href="#">
                <img src="images/Paris2024.png" alt="Franklin Logo" width="150">
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavDropdown" aria-controls="navbarNavDropdown" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNavDropdown">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item dropdown">
                        <div class="nav-item">
                            <a class="nav-link" id="sports-link">Sports</a>
                            <div class="dropdown-menu" id="sports-dropdown">
                                <div class="dropdown-column">
                                    <h6>Baseball</h6>
                                    <a class="dropdown-item" href="#">MLB® Batting Gloves</a>
                                    <a class="dropdown-item" href="#">Fielding Gloves</a>
                                    <a class="dropdown-item" href="#">Training</a>
                                </div>
                                <div class="dropdown-column">
                                    <h6>Soccer</h6>
                                    <a class="dropdown-item" href="#">Balls</a>
                                    <a class="dropdown-item" href="#">Goals/Rebounders</a>
                                    <a class="dropdown-item" href="#">Training</a>
                                </div>
                                <div class="dropdown-column">
                                    <h6>Football</h6>
                                    <a class="dropdown-item" href="#">Balls</a>
                                    <a class="dropdown-item" href="#">Gloves</a>
                                    <a class="dropdown-item" href="#">Flag Football</a>
                                </div>
                            </div>
                        </div>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Family Games</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Fan Shop</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Sale</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Gift Cards</a>
                    </li>
                </ul>
                <form class="d-flex">
                    <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search">
                    <button class="btn btn-outline-dark" type="submit">Search</button>
                </form>
            </div>
            <ul class="navbar-nav justify-content-end" id="bd-theme">
                <li class="nav-item">
                    <div class="nav-link" type="button" data-bs-theme-value="light" aria-pressed="false" onclick="switchTheme('light')">
                        <i class="theme-icon fa fa-sun-o" title="Modo claro"></i>
                    </div>
                </li>
                <li class="navbar-text hstack"><div class="vr"></div></li>
                <li class="nav-item">
                    <div class="nav-link" type="button" data-bs-theme-value="dark" aria-pressed="false" onclick="switchTheme('dark')">
                        <i class="theme-icon fa fa-moon-o" title="Modo escuro"></i>
                    </div>
                </li>
            </ul>
        </div>
    </nav>

    <div id="carouselExample" class="carousel slide" data-bs-ride="carousel">
        <div class="carousel-inner">
            <div class="carousel-item active">
                <img src="images/banner1.png" class="d-block w-100" alt="Slide 1">
            </div>
            <div class="carousel-item">
                <img src="images/banner2.png" class="d-block w-100" alt="Slide 2">
            </div>
            <div class="carousel-item">
                <img src="images/banner3.png" class="d-block w-100" alt="Slide 3">
            </div>
            <div class="carousel-item">
                <img src="images/banner4.png" class="d-block w-100" alt="Slide 3">
            </div>
        </div>
        <button class="carousel-control-prev" type="button" data-bs-target="#carouselExample" data-bs-slide="prev">
            <span class="carousel-control-prev-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Previous</span>
        </button>
        <button class="carousel-control-next" type="button" data-bs-target="#carouselExample" data-bs-slide="next">
            <span class="carousel-control-next-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Next</span>
        </button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        var myCarousel = document.getElementById('carouselExample');
        var carousel = new bootstrap.Carousel(myCarousel, {
            interval: 8000,
            ride: 'carousel'
        });

        const sportsLink = document.getElementById('sports-link');
        const sportsDropdown = document.getElementById('sports-dropdown');
        sportsDropdown.style.display = 'none';

        sportsLink.addEventListener('click', function (e) {
            e.preventDefault();
            const isVisible = sportsDropdown.style.display === 'flex';
            sportsDropdown.style.display = isVisible ? 'none' : 'flex';
        });

        document.addEventListener('click', function (e) {
            if (!sportsDropdown.contains(e.target) && e.target !== sportsLink) {
                sportsDropdown.style.display = 'none';
            }
        });

        function switchTheme(theme) {
            if (theme === 'dark') {
                document.body.classList.remove('light-theme');
                document.body.classList.add('dark-theme');
            } else {
                document.body.classList.remove('dark-theme');
                document.body.classList.add('light-theme');
            }
        }
    </script>
</body>
</html>
