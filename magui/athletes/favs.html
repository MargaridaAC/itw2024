<!DOCTYPE html>
<html data-bs-theme="light">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
    <link href="athletes.css" rel="stylesheet" />
    <title>ProjetoItw</title>
</head>
<body onload="updateTheme()">
 


    <div class="container-fluid" style="margin-top: 126px">
        <div class="row" style="background-image: url('images/homepg/bluebackground.jpg'); align-items: center; width: calc(100% + 24px); height: 200px ">
            <div> </div>
            <h1 style="color: white; text-align: center;"><b>Discover the Athletes of the Paris Olympics</b></h1>
        </div>

        <!-- Working Area -->
        <div class="container">
            <div class="row" style="margin: 10px 0px 10px 0px;">
                <a class=" col-1 btn btn-default btn-outline-primary btn-xs" href="athletesGallery.html"><i style="color:dodgerblue; font:20px" class="fa fa-table" title="Show details"></i></a>
                <div class=" col-5" style="justify-content: end; justify-items: end;display:flex">
                    <input class="form-check-input" type="radio" name="sort" id="sort1" checked>
                    <label class="form-check-label" for="sort1">Name </label>
                    <input class="form-check-input" type="radio" name="sort" id="sort2">
                    <label class="form-check-label" for="sort2">BirthDate </label>
                    <input class="form-check-input" type="radio" name="sort" id="sort3">
                    <label class="form-check-label" for="sort3">BirthCountry </label>
                    <input class="form-check-input" type="radio" name="sort" id="sort4">
                    <label class="form-check-label" for="sort4">Sex </label>
                </div>

                <div class="col-5" style="justify-content: end; justify-items: end;">
                    <input class="form-control" type="text" placeholder="Search" aria-label="Search" style="width:35%" id="procurar" name="procurar" autocomplete="off">
                </div>
                <a class="btn btn-outline-primary col-1" id="searchButton" href="#"><i class="fa fa-search"></i></a>

            </div>
            <div class="row" style="margin: 10px 0px 10px 0px;">
                <label>
                    <input class="form-check-input" type="radio" name="filter" value="all" data-bind="checked: filterOption">
                    All Athletes
                </label>
                <label>
                    <input class="form-check-input" type="radio" name="filter" value="favorites" data-bind="checked: filterOption">
                    Favorites
                </label>
            </div>
            <!-- ko if:athletes().length > 0 -->
            <div class="row small">
                <p class=" col-4 mr-auto pt-2">
                    <span data-bind="html: 'Page: ' + currentPage() + ' of ' + totalPages()"></span><br />
                    <span data-bind="html: 'Athletes: '+ fromRecord() + '-' + toRecord() + ' of ' + totalRecords()"></span>
                </p>
                <div class="col-8 my-0 pt-3">
                    <ul class="pagination float-end">
                        <!-- ko if: currentPage() > 5 && totalPages() > 10 -->
                        <li class="page-item float-end"><a class="page-link" title="First Page" data-bind="attr: { href: './athletes.html?page=' + '1',  rel:'prev'}">⇤</a></li>
                        <li class="page-item float-end"><a class="page-link" title="Previous Page" data-bind="attr: { href: './athletes.html?page=' + previousPage(),  rel:'prev'}">←</a></li>
                        <!-- /ko -->
                        <!-- ko foreach: pageArray()-->
                        <!-- ko if:$data == $parent.currentPage() -->
                        <li class="active page-item"><a class="page-link" data-bind="attr: { title:'Current Page ' + $data }, text: $data"></a></li>
                        <!-- /ko -->
                        <!-- ko if:$data != $parent.currentPage() -->
                        <li class="page-item"><a class="page-link" data-bind="attr: { href: './athletes.html?page=' + $data + '&pagesize=' + $parent.pagesize(), title:'Goto Page ' + $data }, text:$data"></a></li>
                        <!-- /ko -->
                        <!-- /ko -->
                        <!-- ko if: currentPage() < totalPages() - 4 && totalPages() > 9 -->
                        <li class="page-item"><a class="page-link" title="Next Page" data-bind="attr: { href: './athletes.html?page=' + nextPage(), rel:'next' }">→</a></li>
                        <li class="page-item"><a class="page-link" title="Last Page" data-bind="attr: { href: './athletes.html?page=' + totalPages() }">⇥</a></li>
                        <!-- /ko -->
                    </ul>
                </div>
            </div>
            <!-- /ko -->

            <table class="table table-striped table-sm small">
                <thead class="table-secondary">
                    <tr>
                        <th scope="col">Id</th>
                        <th scope="col">Name</th>
                        <th scope="col">Birth Date</th>
                        <th scope="col">Birth Place</th>
                        <th scope="col">Sex</th>
                        <th scope="col" class="text-right"></th>
                    </tr>
                </thead>
                <tbody data-bind="foreach:filteredAthletes">
                    <tr>
                        <td class="align-middle" data-bind="text:Id"></td>
                        <td class="align-middle"><a class="btn" data-bind="attr: { href:'./athletesDetails.html?id=' + Id }"><span data-bind="text:Name"></span></a></td>
                        <td class="align-middle" data-bind="text:BirthDate.substring(0,10)"></td>
                        <td class="align-middle" data-bind="text:BirthPlace"></td>
                        <td class="align-middle" data-bind="text:Sex"></td>
                        <td class="text-end">
                            <a class="btn btn-default btn-light btn-xs" data-bind="attr: { href:'./athletesDetails.html?id=' + Id }"><i class="fa fa-eye" title="Show details"></i></a>
                            <a class="btn btn-default btn-light btn-xs" data-bind="click: function() { $parent.toggleFavorite($data) }, css: { 'text-danger': $parent.isFavorite($data) }">
                                <i class="fa fa-heart" title="Add to favorites"></i>
                            </a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
        <!-- Modal -->
        <div class="modal fade" id="myModal" tabindex="-1" role="dialog" aria-labelledby="myModalLabel" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered" role="document">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title" id="exampleModalLabel">
                            <img src="images/homepg/Olimpicslogo.jpg" height="30" /> Loading data...
                        </h5>
                    </div>
                    <div class="modal-body text-center">
                        <i class="fa fa-spin fa-3x fa-refresh"></i>
                    </div>
                </div>
            </div>
        </div>



    </div>



    <nav class="navbar bg-body-tertiary border-top">
        <div class="container small">
            <div class="navbar-text">&copy;  Introdução as Tecnologias Web - 2024/25</div>
            <div class="navbar-text">Trabalho de Santiago Gandarez e Fernando Santos</div>
            <div class="navbar-nav">
                <div class="nav-item text-end"><a href="https://www.ua.pt" class="nav-link">Universidade de Aveiro</a></div>
            </div>
        </div>
    </nav>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/knockout@3.5.1/build/output/knockout-latest.min.js"></script>
    <script src="favs.js"></script>
    <script>
        window.onload = function () {
            const urlParams = new URLSearchParams(window.location.search);
            const searchQuery = urlParams.get('search');
            const sortQuery = urlParams.get('order');
            if (searchQuery) {
                document.getElementById('procurar').value = decodeURIComponent(searchQuery);
            }
            if (sortQuery) {
                document.getElementById('sort' + sortQuery).checked = true;
            }
        };
        /*document.getElementById('procurar').addEventListener('input', function (event) {
            var searchQuery = document.getElementById('procurar').value;
            var searchUrl = './athletes.html?search=' + encodeURIComponent(searchQuery);
            window.location.href = searchUrl;
        });*/
        document.getElementById('searchButton').addEventListener('click', function (event) {
            event.preventDefault();
            var searchQuery = document.getElementById('procurar').value;
            var searchUrl = './athletes.html?search=' + encodeURIComponent(searchQuery);
            window.location.href = searchUrl;
        });
        document.querySelectorAll('input[name="sort"]').forEach(function (radio) {
            radio.addEventListener('change', function () {
                var searchQuery = document.getElementById('procurar').value;
                var sortQuery = document.querySelector('input[name="sort"]:checked').id.replace('sort', '');
                var searchUrl = './athletes.html?search=' + encodeURIComponent(searchQuery) + '&order=' + encodeURIComponent(sortQuery);
                window.location.href = searchUrl;
            });
        });
    </script>
</body>
</html>
