    <h1>Contagem Regressiva até 14 de Julho de 2028</h1>
    <div class="countdown" id="countdown"></div>
    <div class="bottom-bar">
        <div class="container small">
            <div class="row">
                <div class="col text-start"><a href="https://www.ua.pt/pt/uc/12289" class="link">&copy; ITW - 2024/25</a></div>
                <div class="col text-center">Made by Margarida Cardoso and Tiago Costa</div>
                <div class="col text-end">
                    <a href="https://www.ua.pt" class="link">Universidade de Aveiro</a>
                </div>
            </div>
        </div>
    </div>
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            var countDownDate = new Date("Jul 14, 2028 00:00:00").getTime();

            var x = setInterval(function () {
                var now = new Date().getTime();
                var distance = countDownDate - now;

                var days = Math.floor(distance / (1000 * 60 * 60 * 24));
                var hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                var minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                var seconds = Math.floor((distance % (1000 * 60)) / 1000);

                document.getElementById("countdown").innerHTML = days + "d " + hours + "h " + minutes + "m " + seconds + "s ";

                if (distance < 0) {
                    clearInterval(x);
                    document.getElementById("countdown").innerHTML = "A contagem regressiva acabou!";
                }
            }, 1000);
        });
    </script>
