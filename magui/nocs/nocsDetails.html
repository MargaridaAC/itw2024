<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>NOC Details</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <script src="https://code.jquery.com/jquery-3.6.1.min.js"></script>
</head>
<body>

    <div class="container my-4">
        <div class="row">
            <!-- Título com o botão para voltar -->
            <div class="col d-flex justify-content-between align-items-center">
                <h2 id="nocTitle">Loading...</h2>
                <!-- Botão para voltar -->
                <button class="btn btn-outline-primary" onclick="window.history.back()">
                    <i class="fa fa-arrow-left"></i> Back
                </button>
            </div>
        </div>

        <div id="nocDetails" class="card mt-3">
            <div class="card-body">
                <h5 class="card-title" id="nocName">Loading...</h5>
                <img id="nocPhoto" class="img-thumbnail" src="" alt="NOC Photo" />
                <p id="nocNote"></p>
                <p><strong>Athletes:</strong> <span id="nocAthletes"></span></p>
                <p><strong>Coaches:</strong> <span id="nocCoaches"></span></p>
                <p><strong>Medals:</strong> <span id="nocMedals"></span></p>
                <p><strong>Teams:</strong> <span id="nocTeams"></span></p>
            </div>
        </div>
    </div>

    <script>
        $(document).ready(function () {
            // Pega o ID da NOC da URL
            const urlParams = new URLSearchParams(window.location.search);
            const nocId = urlParams.get('id');

            if (nocId) {
                // Faz uma chamada à API usando o ID da NOC
                $.ajax({
                    url: `https://api.example.com/nocs/${nocId}`, // Substitua com o URL real da API
                    method: 'GET',
                    success: function (data) {
                        // Preenche os detalhes da NOC
                        $('#nocName').text(data.Name);
                        $('#nocTitle').text(`${data.Name} Details`);  // Atualiza o título com o nome da NOC
                        $('#nocPhoto').attr('src', data.Photo || '../Images/PersonNotFound.png');
                        $('#nocNote').text(data.Note);
                        $('#nocAthletes').text(data.Athletes.length);
                        $('#nocCoaches').text(data.Coaches.length);
                        $('#nocMedals').text(data.Medals.length);
                        $('#nocTeams').text(data.Teams.length);
                    },
                    error: function () {
                        alert('Erro ao carregar os dados da NOC.');
                    }
                });
            } else {
                alert('ID da NOC não fornecido.');
            }
        });
    </script>

</body>
</html>
