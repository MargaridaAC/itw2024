<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOCs List</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdn.knockoutjs.com/releases/knockout-3.5.1.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1 class="my-4" data-bind="text: displayName"></h1>

        <!-- Tabela de NOCs -->
        <table class="table table-striped tabela-dados">
            <thead>
                <tr>
                    <th>Country</th>
                    <th>Athletes</th>
                    <th>Coaches</th>
                    <th>Medals</th>
                    <th>Teams</th>
                    <th>Photo</th>
                </tr>
            </thead>
            <tbody data-bind="foreach: NOCs">
                <tr>
                    <td data-bind="text: Country"></td>
                    <td data-bind="text: Athletes"></td>
                    <td data-bind="text: Coaches"></td>
                    <td data-bind="text: Medals"></td>
                    <td data-bind="text: Teams"></td>
                    <td><img data-bind="attr: {src: Photo}" alt="Photo" class="img-thumbnail" width="50"></td>
                </tr>
            </tbody>
        </table>

        <!-- Paginação -->
        <div class="pagination">
            <ul class="pagination">
                <!-- Botão Anterior -->
                <li class="page-item" data-bind="css: { disabled: !hasPrevious() }">
                    <a href="#" class="page-link" data-bind="click: function() { changePage(previousPage()) }">Previous</a>
                </li>

                <!-- Paginação numérica -->
                <!-- Loop para mostrar os números das páginas -->
                <li class="page-item" data-bind="foreach: pageArray">
                    <a href="#" class="page-link" data-bind="text: $data, click: function() { changePage($data) }, css: { active: $data === $parent.currentPage() }"></a>
                </li>

                <!-- Botão Próximo -->
                <li class="page-item" data-bind="css: { disabled: !hasNext() }">
                    <a href="#" class="page-link" data-bind="click: function() { changePage(nextPage()) }">Next</a>
                </li>
            </ul>
        </div>

        <!-- Error message -->
        <div class="alert alert-danger" data-bind="visible: error">
            <strong>Error:</strong> <span data-bind="text: error"></span>
        </div>

        <!-- Loading Spinner -->
        <div id="myModal" class="modal" tabindex="-1" role="dialog" style="display: none;">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-body">
                        <p>Loading...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        var vm = function () {
            var self = this;
            self.baseUri = ko.observable('https://api.example.com/NOCs'); // Altere para a URL da sua API
            self.displayName = 'NOCs List';
            self.error = ko.observable('');
            self.NOCs = ko.observableArray([]);
            self.currentPage = ko.observable(1);
            self.pageSize = ko.observable(4); // Alterado para 4 conforme o exemplo da API
            self.totalRecords = ko.observable(0);
            self.totalPages = ko.observable(0);
            self.hasPrevious = ko.observable(false);
            self.hasNext = ko.observable(false);

            self.previousPage = ko.computed(function () {
                return self.currentPage() - 1;
            }, self);
            self.nextPage = ko.computed(function () {
                return self.currentPage() + 1;
            }, self);

            // Função para obter as páginas que serão mostradas na paginação
            self.pageArray = function () {
                var list = [];
                var size = Math.min(self.totalPages(), 9); // Limita o número de páginas visíveis
                var step;

                // Calcula qual página iniciar (garante que estamos no centro da lista de páginas)
                if (self.totalPages() <= 9 || self.currentPage() === 1) {
                    step = 0;
                } else if (self.currentPage() >= self.totalPages() - 4) {
                    step = self.totalPages() - 9;
                } else {
                    step = Math.max(self.currentPage() - 5, 0);
                }

                // Preenche a lista de páginas
                for (var i = 1; i <= size; i++) {
                    list.push(i + step);
                }
                return list;
            };

            self.activate = function (page) {
                showLoading();
                var uri = self.baseUri() + "?page=" + page + "&pageSize=" + self.pageSize();
                ajaxHelper(uri, 'GET').done(function (data) {
                    hideLoading();
                    self.NOCs(data.NOCs);
                    self.currentPage(data.CurrentPage);
                    self.hasNext(data.HasNext);
                    self.hasPrevious(data.HasPrevious);
                    self.totalPages(data.TotalPages);
                    self.totalRecords(data.TotalNOCs);
                }).fail(function (jqXHR, textStatus, errorThrown) {
                    hideLoading();
                    self.error(errorThrown);
                });
            };

            self.changePage = function (page) {
                if (page >= 1 && page <= self.totalPages()) {
                    self.activate(page);
                }
            };

            function ajaxHelper(uri, method) {
                self.error(''); // Clear error message
                return $.ajax({
                    type: method,
                    url: uri,
                    dataType: 'json',
                    contentType: 'application/json',
                    error: function (jqXHR, textStatus, errorThrown) {
                        console.log("AJAX Call[" + uri + "] Fail...");
                        hideLoading();
                        self.error(errorThrown);
                    }
                });
            }

            function showLoading() {
                $("#myModal").modal('show', {
                    backdrop: 'static',
                    keyboard: false
                });
            }

            function hideLoading() {
                $("#myModal").modal('hide');
            }

            var pg = getUrlParameter('page');
            if (pg === undefined) {
                self.activate(1);
            } else {
                self.activate(pg);
            }

            function getUrlParameter(sParam) {
                var sPageURL = window.location.search.substring(1),
                    sURLVariables = sPageURL.split('&'),
                    sParameterName,
                    i;
                for (i = 0; i < sURLVariables.length; i++) {
                    sParameterName = sURLVariables[i].split('=');
                    if (sParameterName[0] === sParam) {
                        return sParameterName[1] === undefined ? true : decodeURIComponent(sParameterName[1]);
                    }
                }
            };
        };

        $(document).ready(function () {
            ko.applyBindings(new vm());
        });
    </script>
</body>
</html>
