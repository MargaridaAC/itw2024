<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <title>Weather in Los Angeles</title>
    <link href="https://fonts.googleapis.com/css?family=Roboto:300" rel="stylesheet" type="text/css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <style>
        .weather-box {
            background-color: #ffe4b2; /* Light orange */
            border: 1px solid #ffa500; /* Orange border */
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            max-width: 300px;
            margin: 0 auto;
            font-family: 'Roboto', sans-serif;
        }

            .weather-box img {
                max-width: 100px;
                margin-bottom: 15px;
            }

            .weather-box .temperature {
                font-size: 1.5em;
                font-weight: bold;
            }

            .weather-box .description {
                font-size: 1.2em;
                text-transform: capitalize;
            }
    </style>
</head>
<body>
    <div class="container my-5">
        <div class="weather-box d-none" id="weatherBox">
            <img id="weatherIcon" alt="Weather Icon">
            <div class="description" id="weather"></div>
            <div class="temperature" id="temp"></div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        $(document).ready(function () {
            // Fetch weather data for Los Angeles on page load
            $.ajax({
                url: "https://api.openweathermap.org/data/2.5/weather",
                data: {
                    q: "Los Angeles, US",
                    APPID: 'b2b1df463182c3cca5276e9d3267cc95'
                },
                success: function (data) {
                    if (data.name) {
                        $("#weatherBox").removeClass("d-none");
                        $("#weather").html(data.weather[0].description);
                        $("#temp").html(
                            (data.main.temp - 273.15).toFixed(2) + ' °C'
                        );

                        // Add weather icon
                        const iconCode = data.weather[0].icon;
                        const iconUrl = `https://openweathermap.org/img/wn/${iconCode}@2x.png`;
                        $("#weatherIcon").attr("src", iconUrl);
                    } else {
                        alert('City not found!');
                    }
                },
                error: function () {
                    alert('Error fetching weather data!');
                }
            });
        });
    </script>
</body>
</html>
