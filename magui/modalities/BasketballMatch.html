<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Details</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
    <div class="container mt-4">
        <h2 id="detailsTitle">Details</h2>
        <table class="table table-bordered mt-4">
            <thead class="table-secondary">
                <tr>
                    <th scope="col">Property</th>
                    <th scope="col">Value</th>
                </tr>
            </thead>
            <tbody id="detailsBody">
                <!-- Detalhes serão inseridos aqui -->
            </tbody>
        </table>
        <button id="backButton" class="btn btn-secondary mt-4">Back</button>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        const apiBaseURL = "http://192.168.160.58/Paris2024/api/Basketballs/%7Bid%7D";

        $(document).ready(function () {
            const urlParams = new URLSearchParams(window.location.search);
            const eventId = urlParams.get('EventId');
            const stageId = urlParams.get('StageId');

            if (!eventId || !stageId) {
                alert("EventId ou StageId não encontrados!");
                return;
            }

            const requestURL = `${apiBaseURL}?EventId=${eventId}&StageId=${stageId}`;

            // Faz requisição à API
            $.ajax({
                url: requestURL,
                method: "GET",
                dataType: "json",
                success: function (data) {
                    populateDetails(data);
                },
                error: function () {
                    alert("Erro ao carregar os detalhes.");
                }
            });

            // Preenche a tabela com os detalhes
            function populateDetails(details) {
                const $detailsBody = $("#detailsBody");
                $detailsBody.empty();

                if (details.length === 0) {
                    $detailsBody.append("<tr><td colspan='2' class='text-center'>Nenhum detalhe encontrado!</td></tr>");
                    return;
                }

                // Para cada campo de um item, adicionamos uma linha na tabela
                details.forEach(item => {
                    Object.entries(item).forEach(([key, value]) => {
                        // Exibir as propriedades simples ou arrays de forma detalhada
                        if (Array.isArray(value)) {
                            // Exibe itens de arrays como lista
                            $detailsBody.append(`
                                    <tr>
                                        <td>${key}</td>
                                        <td>
                                            <ul>
                                                ${value.map(subItem => `<li>${JSON.stringify(subItem)}</li>`).join("")}
                                            </ul>
                                        </td>
                                    </tr>
                                `);
                        } else if (typeof value === "object" && value !== null) {
                            // Exibe subcampos de objetos aninhados
                            $detailsBody.append(`
                                    <tr>
                                        <td>${key}</td>
                                        <td>
                                            <ul>
                                                ${Object.entries(value).map(([subKey, subValue]) => `<li>${subKey}: ${subValue}</li>`).join("")}
                                            </ul>
                                        </td>
                                    </tr>
                                `);
                        } else {
                            // Exibe valores simples (string, número, etc.)
                            $detailsBody.append(`
                                    <tr>
                                        <td>${key}</td>
                                        <td>${value}</td>
                                    </tr>
                                `);
                        }
                    });
                });

                $("#detailsTitle").text(`Details for Stage: ${details[0].StageName}`);
            }

            // Botão "Back"
            $("#backButton").click(function () {
                window.history.back();
            });
        });
    </script>
</body>
</html>
