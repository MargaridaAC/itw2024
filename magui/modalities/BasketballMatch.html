<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Match Details</title>
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.1.3/css/bootstrap.min.css">
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
    <div class="container mt-4">
        <h2 id="matchTitle" class="mb-4">Match Details</h2>

        <ul id="matchDetailsList" class="list-group">
            <!-- Informações serão preenchidas dinamicamente aqui -->
        </ul>

        <!-- Botão de Voltar -->
        <div class="mt-4">
            <button id="backButton" class="btn btn-secondary">
                <i class="fa fa-arrow-left"></i> Back to Stage Details
            </button>
        </div>
    </div>

    <script>
    const apiBaseURL = "http://192.168.160.58/Paris2024/api/Basketballs";

    $(document).ready(function () {
        const urlParams = new URLSearchParams(window.location.search);
        const eventId = urlParams.get('EventId');
        const stageId = urlParams.get('StageId');

        if (!eventId || !stageId) {
            alert("EventId ou StageId não encontrados!");
            return;
        }

        // Função para buscar os detalhes do Match
        function loadMatchDetails(eventId, stageId) {
            const requestURL = `${apiBaseURL}?EventId=${eventId}&StageId=${stageId}`;

            $.ajax({
                url: requestURL,
                method: "GET",
                dataType: "json",
                success: function (data) {
                    populateMatchDetailsList(data);
                },
                error: function () {
                    alert("Erro ao carregar os detalhes do Match.");
                }
            });
        }

        // Função para preencher a lista com os detalhes
        function populateMatchDetailsList(details) {
            const $list = $("#matchDetailsList");
            $list.empty(); // Limpar lista

            if (!details) {
                $list.append("<li class='list-group-item text-center'>Nenhum detalhe encontrado!</li>");
                return;
            }

            $("#matchTitle").text(`Match: ${details.Name}`);

            const detailsMap = {
                "ID": details.Id,
                "Event Name": details.EventName,
                "Stage Name": details.StageName,
                "Date": new Date(details.Date).toLocaleString(),
                "Sex": details.Sex,
                "Venue": details.Venue,
                "Participant Type": details.ParticipantType,
                "Participant Code": details.ParticipantCode,
                "Participant Name": details.ParticipantName,
                "Country": `${details.CountryName} (${details.CountryCode})`,
                "Rank": details.Rank,
                "Result": details.Result,
                "Result Type": details.ResultType,
                "Result IRM": details.ResultIRM,
                "Result Diff": details.ResultDiff,
                "Result WLT": details.ResultWLT,
                "Qualification Mark": details.QualificationMark,
                "Start Order": details.StartOrder,
                "Bib": details.Bib
            };

            // Criar a lista de itens
            Object.entries(detailsMap).forEach(([key, value]) => {
                const listItem = `
                    <li class="list-group-item d-flex justify-content-between">
                        <strong>${key}:</strong> <span>${value || "N/A"}</span>
                    </li>
                `;
                $list.append(listItem);
            });
        }

        // Botão "Back to Stage Details"
        $("#backButton").click(function () {
            window.history.back();
        });

        // Carregar detalhes ao abrir a página
        loadMatchDetails(eventId, stageId);
    });
    </script>
</body>
</html>
